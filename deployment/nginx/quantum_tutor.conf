map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

map $http_cf_connecting_ip $qt_client_ip {
    default $http_cf_connecting_ip;
    ''      $remote_addr;
}

map $http_cf_access_authenticated_user_email $qt_authenticated_user {
    default $http_cf_access_authenticated_user_email;
    ''      '';
}

log_format quantum_tutor_edge escape=json
    '{"ts":"$time_iso8601","host":"$host","request_id":"$request_id","remote_addr":"$remote_addr",'
    '"client_ip":"$qt_client_ip","method":"$request_method","uri":"$request_uri","status":$status,'
    '"bytes_sent":$bytes_sent,"request_time":$request_time,"upstream_addr":"$upstream_addr",'
    '"upstream_status":"$upstream_status","upstream_response_time":"$upstream_response_time",'
    '"cf_ray":"$http_cf_ray","access_user":"$qt_authenticated_user"}';

limit_req_zone $qt_client_ip zone=qt_chat_rate:10m rate=5r/s;
limit_req_zone $qt_client_ip zone=qt_vision_rate:10m rate=1r/s;
limit_conn_zone $qt_client_ip zone=qt_per_ip_conn:10m;

upstream quantum_tutor_streamlit {
    server 127.0.0.1:8501;
    keepalive 16;
}

upstream quantum_tutor_api {
    server 127.0.0.1:8000;
    keepalive 32;
}

server {
    listen 127.0.0.1:8080 default_server;
    server_name _;
    return 404;
}

server {
    listen 127.0.0.1:8080;
    server_name quantumtutor.cl;

    proxy_http_version 1.1;
    proxy_read_timeout 180s;
    proxy_connect_timeout 15s;
    proxy_send_timeout 180s;
    client_max_body_size 6m;
    access_log /var/log/nginx/quantum_tutor_access.log quantum_tutor_edge;
    error_log /var/log/nginx/quantum_tutor_error.log warn;

    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header X-Request-ID $request_id always;

    location ~ ^/healthz?$ {
        proxy_pass http://quantum_tutor_api/healthz;
        proxy_set_header Host $host;
        proxy_set_header X-Request-ID $request_id;
        proxy_set_header X-Real-IP $qt_client_ip;
        proxy_set_header X-Forwarded-For $qt_client_ip;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header CF-Connecting-IP $qt_client_ip;
        proxy_set_header X-Authenticated-User $qt_authenticated_user;
        proxy_set_header X-Quantum-Host-Tier public;
    }

    location /api/ {
        return 404;
    }

    location / {
        proxy_pass http://quantum_tutor_streamlit;
        proxy_set_header Host $host;
        proxy_set_header X-Request-ID $request_id;
        proxy_set_header X-Real-IP $qt_client_ip;
        proxy_set_header X-Forwarded-For $qt_client_ip;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Authenticated-User $qt_authenticated_user;
        proxy_set_header X-Quantum-Host-Tier public;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}

