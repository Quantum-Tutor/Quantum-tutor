server {
    listen 127.0.0.1:8080;
    server_name api.quantumtutor.cl;

    proxy_http_version 1.1;
    proxy_read_timeout 180s;
    proxy_connect_timeout 15s;
    proxy_send_timeout 180s;
    limit_req_status 429;
    limit_conn_status 429;
    client_max_body_size 6m;
    access_log /var/log/nginx/quantum_tutor_access.log quantum_tutor_edge;
    error_log /var/log/nginx/quantum_tutor_error.log warn;

    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header X-Request-ID $request_id always;

    location ~ ^/healthz?$ {
        proxy_pass http://quantum_tutor_api/healthz;
        proxy_set_header Host $host;
        proxy_set_header X-Request-ID $request_id;
        proxy_set_header X-Real-IP $qt_client_ip;
        proxy_set_header X-Forwarded-For $qt_client_ip;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header CF-Connecting-IP $qt_client_ip;
        proxy_set_header X-Authenticated-User $qt_authenticated_user;
        proxy_set_header X-Quantum-Host-Tier api;
    }

    location /api/chat {
        limit_req zone=qt_chat_rate burst=20 nodelay;
        limit_conn qt_per_ip_conn 25;

        proxy_pass http://quantum_tutor_api;
        proxy_set_header Host $host;
        proxy_set_header X-Request-ID $request_id;
        proxy_set_header X-Real-IP $qt_client_ip;
        proxy_set_header X-Forwarded-For $qt_client_ip;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header CF-Connecting-IP $qt_client_ip;
        proxy_set_header X-Authenticated-User $qt_authenticated_user;
        proxy_set_header X-Quantum-Host-Tier api;
    }

    location /api/vision {
        limit_req zone=qt_vision_rate burst=5 nodelay;
        limit_conn qt_per_ip_conn 10;
        client_max_body_size 6m;

        proxy_pass http://quantum_tutor_api;
        proxy_set_header Host $host;
        proxy_set_header X-Request-ID $request_id;
        proxy_set_header X-Real-IP $qt_client_ip;
        proxy_set_header X-Forwarded-For $qt_client_ip;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header CF-Connecting-IP $qt_client_ip;
        proxy_set_header X-Authenticated-User $qt_authenticated_user;
        proxy_set_header X-Quantum-Host-Tier api;
    }

    location /api/ {
        proxy_pass http://quantum_tutor_api;
        proxy_set_header Host $host;
        proxy_set_header X-Request-ID $request_id;
        proxy_set_header X-Real-IP $qt_client_ip;
        proxy_set_header X-Forwarded-For $qt_client_ip;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header CF-Connecting-IP $qt_client_ip;
        proxy_set_header X-Authenticated-User $qt_authenticated_user;
        proxy_set_header X-Quantum-Host-Tier api;
    }

    location / {
        return 404;
    }
}
